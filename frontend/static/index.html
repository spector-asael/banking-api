<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craboo Bank | Account Lookup</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <div id="global-error" class="error-banner"></div>

    <div class="app-wrapper">
        <section id="search-view" class="centered-screen">
            <div class="search-card">
                <div class="header-unit">
                    <div class="logo">Craboo<span>Bank</span></div>
                    <p>Enter an account number to view activity</p>
                </div>
                <div class="input-group">
                    <input type="text" id="main-search-input" placeholder="e.g. ACC51" autofocus>
                    <button id="btn-main-search" class="btn-primary">View History</button>
                </div>
            </div>
        </section>

        <section id="history-view" style="display: none;">
            <header class="main-header">
                <div class="logo">Nexus<span>Bank</span></div>
                <button id="btn-back" class="btn-ghost">← Back to Search</button>
            </header>

            <main class="container">
                <div class="toolbar card">
                    <div class="filter-group" style="display: none;
                    ">
                        <label>Sort By</label>
                        <select id="sort-select">
                            <option value="-date">Newest First</option>
                            <option value="date">Oldest First</option>
                            <option value="-amount">Highest Amount</option>
                            <option value="amount">Lowest Amount</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Page Size</label>
                        <input type="number" id="pagesize-input" value="10" min="1" max="100" style="width: 60px;">
                    </div>

                    <button id="btn-reload" class="btn-primary" style="padding: 8px 16px;">Apply & Reload</button>
                </div>

                <div class="table-container">
                    <div class="table-header-info">
                        <h3 id="active-account-label">Transaction History</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Recipient</th>
                                <th class="text-right">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody"></tbody>
                    </table>
                </div>
                
                <div class="pagination" id="pagination-controls"></div>
            </main>
        </section>
    </div>
</body>
</html>
